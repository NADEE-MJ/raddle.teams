meta:
  title: From TRIPLE to AXEL
  theme: winter_olympics
  message: The triple axel is a figure skating jump where the skater takes off from a forward outside edge, completes three and a half rotations in the air, and lands on the back outside edge of the opposite foot.
    Canadian skater Vern Taylor was the first to land one in competition, at the 1978 World Championships.
