meta:
  title: From APPLES to PEARS
  theme: cockney_rhyming_slang
  discord_thread_id: '1495420509997891737'
  message: 
    '"Apples and pears" is Cockney rhyming slang for "stairs", as in "Take the apples and pears to the basement and bring up that crate of bananas".'
