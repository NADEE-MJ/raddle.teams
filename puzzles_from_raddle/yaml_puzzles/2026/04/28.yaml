meta:
  title: From BRASS to TACKS
  theme: cockney_rhyming_slang
  discord_thread_id: '1495414643093672101'
  message: '"Brass tacks" is Cockney rhyming slang for "facts". Of course, you probably already know this, as it arguably has the biggest leap of any Cockney phrase into mainstream English, with "getting down to brass tacks" being a widely used idiom. Now you know where it comes from!'
