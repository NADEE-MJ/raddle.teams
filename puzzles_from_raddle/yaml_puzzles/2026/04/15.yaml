meta:
  title: From DIRTY to THREE
  theme: big_ears_2026
  discord_thread_id: '1490343269522215043'
  message: Dirty Three played a late-night set at the Tennessee Theater on Friday, part of their first North American tour in 14 years.
    It was unhinged and Ellis was slightly off-putting, but it also melted my face off and left me invigorated, so, really, no complaints.
