meta:
  title: From PERFUME to GENIUS
  theme: big_ears_2026
  discord_thread_id: '1490513731380318208'
  message: The fun thing about seeing Perfume Genius live is he spends a lot of time on stage mimicking his album art and promo photos — laying on the ground and draped across chairs and wielding the mic stand like a joust. Of course it also helps that his music is so lively and catchy. 
