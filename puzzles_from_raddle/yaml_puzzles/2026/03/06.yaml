meta:
  title: From FRANK to STEIN
  theme: oscars_2025
  message: 
    Guillermo del Toro's long-gestating _Frankenstein_ adaptation stars Oscar Isaac as the obsessed scientist and Jacob Elordi as his tragic creature. It picked up nine Oscar nominations including Best Picture, Best Supporting Actor (Elordi), and Best Adapted Screenplay. I tried watching this one at home, and found it befuddling and tedious. 
