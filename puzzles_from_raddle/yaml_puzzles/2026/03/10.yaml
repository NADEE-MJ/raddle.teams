meta:
  title: From TRAIN to DREAMS
  theme: oscars_2025
  message: "_Train Dreams_, a Clint Bentley adaptation of a Denis Johnson novella, follows a man named Robert Grainier across eight decades of solitary life in the logging camps and forests of the early American West. 
    It's quiet and meditative, reminiscent of what I love about Terrence Malick films, and best experienced in a distractionless movie theatre where you can get immersed in its gorgeous sights and sounds.
    It picked up four nominations: Best Picture, Best Adapted Screenplay, Best Cinematography, and Best Original Score."
