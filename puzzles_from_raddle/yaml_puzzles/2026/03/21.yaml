meta:
  title: From PAPYRUS to SANS
  theme: siblings
  discord_thread_id: '1480562323629539389'
  message: Sans and Papyrus are brother skeletons who exist in the video game “Undertale”. The two patrol Snowdin Forest, where Papyrus, an aspiring Royal Guard, sets puzzles in hopes of capturing a human, while the lazier Sans tags along, cracking jokes and commentating on his brother's schemes. The brothers quickly became beloved by the internet and have been widely meme-ified.
