meta:
  title: From HALLE to BERRY
  theme: womens_history_month
  discord_thread_id: '1481424985816830064'
  message: On March 24, 2002, Halle Berry became the first African American woman to win the Academy Award for Best Actress, for her role in “Monster's Ball”. 
    Before Berry, the only African American actresses to win any acting Oscar were Hattie McDaniel, for her supporting role in “Gone With the Wind” in 1939 and Whoopi Goldberg for "Ghost" in 1990. More than two decades later, Berry remains the only Black woman ever to win in that category.
