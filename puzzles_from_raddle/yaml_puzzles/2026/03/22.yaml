meta:
  title: From ALICE to PAUL
  theme: womens_history_month
  discord_thread_id: '1481651406409699591'
  message: Alice Paul was a pioneering women's suffragist in the early 1900s. She spent many years as leader of the National Woman's Party, championing the Equal Rights Amendment, to codify the prohibition of sex discrimination. In 1943, the amendment was renamed the "Alice Paul Amendment" in her honor. On March 22, 1972, the Equal Rights Amendment was passed by Congress. It has since been ratified by 38 states, meeting the threshold required for constitutional amendments, thus making it the law of the land. But it hasn’t been officially added to the U.S. Constitution, or recognized by the National Archives.
