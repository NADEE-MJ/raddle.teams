meta:
  title: From HAM to NET
  theme: oscars_2025
  message: Chloé Zhao's adaptation of Maggie O'Farrell's novel follows a young man named William Shakespeare (Paul Mescal) 
    and his wife Agnes (Jessie Buckley) and their three children, until one gets sick and dies, which plunges the family, especially Agnes, into an all-consuming grief.
    It picked up eight nominations including Best Picture, Best Director, and Best Actress for Buckley, who will win, and deservedly so.
    In a word, this movie is gutting. Jacobi Jupe as little Hamnet is a wonder. Wish we had more time to spend with him, but I guess that's the point.
