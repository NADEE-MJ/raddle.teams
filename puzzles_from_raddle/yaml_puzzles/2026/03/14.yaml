meta:
  title: From BATTLE to BATTLE
  theme: oscars_2025
  message: Paul Thomas Anderson's _One Battle_ is a loose adaptation of Thomas Pynchon's _Vineland_. 
    It follows a burned-out revolutionary (Leonardo DiCaprio) living off-grid with his teenage daughter Willa,
    until a psychotic military officer (Sean Penn) resurfaces to settle old scores. 
    It racked up 13 nominations, all deserving.
    I was all the right movie-going ages to revere PTA's work over the last 30 years, making me the precise demographic to adore this one. 
    Obviously I'm not alone. Every aspect of the storytelling, score, cinematography, and direction are crafted so precisely,
    making it a wonder to watch. Even the Pynchonian absurdity, which normally turns me off, felt in harmony with the 
    grounded political message. On top of that, Chase Infiniti, the actor who plays Willa, may have been at [the same 
    opening weekend screening](https://www.youtube.com/watch?v=cz1I-7oHrEE&t=43s) I was at.
