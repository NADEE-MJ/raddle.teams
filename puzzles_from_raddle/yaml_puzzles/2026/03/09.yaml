meta:
  title: From SECRET to AGENT
  theme: oscars_2025
  message: 
    _The Secret Agent_ is a Brazilian film that follows a man hiding from the military dictatorship in 1977, 
    while trying to get himself and his son out of the country. 
    In addition to the Best Picture nom, lead Wagner Moura earned the first Best Actor nomination for a Brazilian.
    Oops, I hated this one! The whole time, it felt like the director was going out of his way to make the experience difficult for the audience, which isn't a feeling I love.
    I will give credit to Moura, who is wonderful, as is every actor in a supporting role.
