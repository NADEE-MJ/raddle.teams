meta:
  title: From BILLIE to HOLIDAY
  theme: womens_history_month
  discord_thread_id: '1483228096105549834'
  message: On March 27, 1948, Billie Holiday took the stage at Carnegie Hall for a legendary sold-out concert — just days after being released from prison. She performed 32 songs that night, including 'Strange Fruit,' to an audience of over 2,700. Throughout her career, Holiday left a lasting mark on jazz and swing music through her one-of-a-kind vocal stylings.
