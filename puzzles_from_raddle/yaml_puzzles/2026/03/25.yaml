  title: From ROSA to PARKS
  theme: womens_history_month
  discord_thread_id: '1482012424717733888'
  message: The Selma to Montgomery March, which arrived in Montgomery on March 25, 1965, was a landmark civil rights milestone, shaped in large part by women activists whose contributions are often underrecognized. Diane Nash, Amelia Boynton Robinson, and Rosa Parks were among those instrumental to the strategy and success of the broader voting rights movement.
