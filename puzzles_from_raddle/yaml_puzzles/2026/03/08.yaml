meta:
  title: From SENTIMENTAL to VALUE
  theme: oscars_2025
  message: Joachim Trier's Norwegian family drama follows two sisters reconnecting with their film director father, from whom they've been estranged.
    I _loved_ Trier's _Worst Person In The World_ and found lots to like in _Value_, especially the way the film centers the family home as a character that has borne witness to generations of family drama and trauma.
    For whatever reason, I didn't fully connect emotionally with it, so this one gets filed under "respect, from a distance".
