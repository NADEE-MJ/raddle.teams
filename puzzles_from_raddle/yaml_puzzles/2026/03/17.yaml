meta:
  title: From MABEL to DIPPER
  theme: siblings
  message: 
    Mabel and Dipper Pines are the tween protagonists of the show _Gravity Falls_. 
    When the twins are sent to stay with their Great Uncle (Grunkle) Stan, they find town secrets and paranormal activity aplenty.
    They may bicker and joke like all siblings, but as an interdimensional demon threatens the world, they always have each other's backs.
